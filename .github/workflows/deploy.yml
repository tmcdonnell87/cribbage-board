name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cribbage
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}
      - name: Deploy to web host
        env:
          WEB_HOST: ${{ secrets.WEB_HOST }}
        run: |
          REL="releases/$(date +%Y-%m-%dT%H%M%S)"
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=accept-new" \
            dist/ "$WEB_HOST:/srv/cribbage/$REL/"
          ssh -o StrictHostKeyChecking=accept-new "$WEB_HOST" \
            "ln -sfn /srv/cribbage/$REL /srv/cribbage/current && \
             ls -1dt /srv/cribbage/releases/*/ | tail -n +4 | xargs -r rm -rf"
